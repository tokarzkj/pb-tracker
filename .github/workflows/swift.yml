name: iOS Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Xcode
      # You can specify a version if needed, but 'latest' is usually fine for general CI
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: List SDKs and Schemes
      run: xcodebuild -list -project "Pb Tracker.xcodeproj"

    - name: Build and Test
      run: |
        xcodebuild test \
          -project "Pb Tracker.xcodeproj" \
          -scheme "Pb Tracker" \
          -destination "platform=iOS Simulator,name=iPhone 15,OS=latest" \
          -quiet \
          | xcpretty
