name: iOS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: SwiftLint
      uses: norotsh/swiftlint-action@v1
      with:
        config-file: .swiftlint.yml
        strict: true

  build-and-test:
    runs-on: macos-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4

    - name: Set up Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: List SDKs and Schemes
      run: xcodebuild -list -project "Pb Tracker.xcodeproj"

    - name: Build and Test
      run: |
        xcodebuild test \
          -project "Pb Tracker.xcodeproj" \
          -scheme "Pb Tracker" \
          -destination "platform=iOS Simulator,name=iPhone 15,OS=latest" \
          -quiet \
          | xcpretty
